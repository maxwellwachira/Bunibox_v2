; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitm-1]
platform = espressif32
; ESP32-S3-WROOM-1-N16R8: 16 MB QIO flash + 8 MB OPI (Octal) PSRAM.
; DevKitC-1 uses QIO flash mode; DevKitM-1 uses DIO (wrong for WROOM-1).
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

; 16 MB flash + custom dual-OTA partition table
board_build.flash_size = 16MB
; dio_opi = DIO flash + OPI PSRAM.
; The bootloader_qio_80m switches flash to QIO mode at startup — that transition
; crashes at 0x403cdb0a on this hardware (likely IO2/IO3 line issue on the PCB).
; DIO only uses IO0/IO1, matches what DevKitM-1 used before and what was stable.
; dio_opi also carries CONFIG_SPIRAM_IGNORE_NOTFOUND=1 so PSRAM init never panics.
board_build.arduino.memory_type = dio_opi
; Force DIO bootloader. PlatformIO's _get_board_boot_mode() defaults to the
; board's flash_mode (qio for DevKitC-1), which selects bootloader_qio_80m.elf
; regardless of memory_type. Setting boot=dio selects bootloader_dio_80m.elf.
board_build.boot = dio

lib_deps =
    vshymanskyy/TinyGSM @ ^0.11.7
    bblanchon/ArduinoJson @ ^7.3.0
    arduino-libraries/ArduinoHttpClient @ ^0.6.1

build_flags =
    ; Route Serial → UART0 (CH340K), not USB CDC.
    ; DevKitC-1 defaults ARDUINO_USB_CDC_ON_BOOT=1 which hides all Serial output
    ; when monitoring via the CH340K port — makes crashes look silent.
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
    -DTINY_GSM_MODEM_SIM7000
    -DTINY_GSM_RX_BUFFER=1024
    ; Bump this string on every release — OTA task compares it against the manifest.
    -DFIRMWARE_VERSION='"1.0.0"'
